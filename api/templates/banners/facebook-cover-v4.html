<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Facebook cover — v4 freelance / studio</title>
    <!-- Facebook page cover: 1640×624 px. Style "dibodev". -->
    <style>
      :root {
        --c1: {{ client.color_primary or '#5b4cff' }};
        --c2: {{ client.color_secondary or '#7c3aed' }};
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: #0b1220; }
      .b {
        width: 1640px; height: 624px;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        color: #fff; position: relative; overflow: hidden;
        background:
          radial-gradient(1300px 800px at 30% 50%, rgba(255,255,255,0.20), rgba(255,255,255,0) 55%),
          linear-gradient(135deg, var(--c1) 0%, var(--c2) 55%, #2a1d8a 100%);
      }
      .shine { position: absolute; inset: 0; background: linear-gradient(105deg, rgba(255,255,255,0) 30%, rgba(255,255,255,0.18) 50%, rgba(255,255,255,0) 70%); mix-blend-mode: screen; pointer-events: none; }
      .waves {
        position: absolute; left: 0; right: 0; bottom: -2px; height: 32px;
        background:
          linear-gradient(90deg, rgba(0,0,0,0.32), rgba(0,0,0,0)),
          repeating-linear-gradient(45deg, rgba(255,255,255,0.06) 0 12px, rgba(255,255,255,0) 12px 24px);
      }
      .row { position: relative; z-index: 1; height: 100%; display: grid; grid-template-columns: 1fr 540px; align-items: center; }
      .left { padding: 0 56px 0 100px; display: flex; align-items: center; gap: 32px; }
      .logo {
        width: 124px; height: 124px; border-radius: 26px; overflow: hidden;
        background: #ffffff; flex: 0 0 auto;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 14px 30px rgba(0,0,0,0.22);
      }
      .logo img { width: 76%; height: 76%; object-fit: contain; }
      .brand .name { font-size: 90px; font-weight: 900; letter-spacing: -0.02em; line-height: 1; }
      .brand .domain { margin-top: 12px; font-size: 22px; opacity: 0.92; font-weight: 600; }
      .right { height: 100%; display: flex; align-items: center; padding: 0 80px; position: relative; }
      .right:before {
        content: ""; position: absolute; left: 0; top: 100px; bottom: 100px; width: 1px;
        background: linear-gradient(180deg, rgba(255,255,255,0), rgba(255,255,255,0.45) 20%, rgba(255,255,255,0.45) 80%, rgba(255,255,255,0));
      }
      .pitch { font-size: 30px; font-weight: 700; line-height: 1.3; max-width: 400px; }
      .pitch .ttl { display: block; font-size: 12px; letter-spacing: .32em; text-transform: uppercase; color: rgba(255,255,255,0.78); margin-bottom: 14px; font-weight: 800; }
      .pitch .url {
        display: inline-block; margin-top: 14px;
        background: rgba(255,255,255,0.14); border: 1px solid rgba(255,255,255,0.30);
        padding: 10px 18px; border-radius: 999px; font-size: 16px; font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="b">
      <div class="shine"></div>
      <div class="row">
        <div class="left">
          <div class="logo">{% if client.logo_url %}<img src="{{ client.logo_url }}" alt="" />{% endif %}</div>
          <div class="brand">
            <div class="name">{{ client.name }}</div>
            <div class="domain">{{ client.website_label or client.website_url or '' }}</div>
          </div>
        </div>
        <div class="right">
          <div class="pitch">
            <span class="ttl">— Page officielle</span>
            {{ client.subtitle or 'Présentation de la page' }}
            <div><span class="url">{{ client.website_label or client.website_url or '' }}</span></div>
          </div>
        </div>
      </div>
      <div class="waves"></div>
    </div>
  </body>
</html>
