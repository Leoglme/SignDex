<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LinkedIn banner — v1</title>
    <style>
      :root {
        --c1: {{ client.color_primary or '#4e8baa' }};
        --c2: {{ client.color_secondary or '#5a9abf' }};
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: #111827; }
      table { border-collapse: collapse; }
      .banner {
        width: 1584px;
        height: 396px;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
        background: radial-gradient(1200px 420px at 85% 20%, rgba(255,255,255,0.18), rgba(255,255,255,0) 60%),
          linear-gradient(135deg, var(--c1), var(--c2));
        color: #fff;
        padding: 48px 64px;
      }
      .row { display: flex; height: 100%; align-items: center; justify-content: space-between; gap: 32px; }
      .left { min-width: 0; }
      .name { font-size: 44px; font-weight: 900; line-height: 1.05; margin: 0; }
      .sub { margin-top: 10px; font-size: 18px; opacity: 0.95; }
      .pill {
        margin-top: 18px;
        display: inline-flex;
        gap: 10px;
        align-items: center;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(15,23,42,0.18);
        border: 1px solid rgba(255,255,255,0.22);
        font-weight: 700;
      }
      .logo {
        width: 132px;
        height: 132px;
        border-radius: 26px;
        background: rgba(255,255,255,0.18);
        border: 1px solid rgba(255,255,255,0.22);
        overflow: hidden;
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .logo img { width: 100%; height: 100%; object-fit: contain; background:#fff; }
    </style>
  </head>
  <body>
    <table role="presentation" class="banner">
      <tr>
        <td valign="middle">
          <div class="row">
            <div class="left">
              <div class="name">{{ client.name }}</div>
              <div class="sub">{{ client.subtitle or '' }}</div>
              <div class="pill">
                {% if client.website_label or client.website_url %}
                  <span>{{ client.website_label or client.website_url }}</span>
                {% endif %}
                {% if client.email %}
                  <span style="opacity:.65">•</span>
                  <span>{{ client.email }}</span>
                {% endif %}
              </div>
            </div>
            <div class="logo">
              {% if client.logo_url %}<img src="{{ client.logo_url }}" alt="" />{% endif %}
            </div>
          </div>
        </td>
      </tr>
    </table>
  </body>
</html>
