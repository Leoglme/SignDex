<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>LinkedIn banner — v4 freelance / studio</title>
    <!-- LinkedIn personal banner: 1584×396 px. Style "dibodev" : dégradé violet/bleu, logo+marque à gauche, baseline à droite via séparateur fin. -->
    <style>
      :root {
        --c1: {{ client.color_primary or '#5b4cff' }};
        --c2: {{ client.color_secondary or '#7c3aed' }};
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: #0b1220; }
      .b {
        width: 1584px; height: 396px;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        color: #fff;
        position: relative;
        overflow: hidden;
        background:
          radial-gradient(1200px 600px at 30% 50%, rgba(255,255,255,0.20), rgba(255,255,255,0) 55%),
          linear-gradient(135deg, var(--c1) 0%, var(--c2) 55%, #2a1d8a 100%);
      }
      /* Lumière diagonale animée façon "shine" */
      .shine {
        position: absolute; inset: 0;
        background:
          linear-gradient(105deg, rgba(255,255,255,0) 30%, rgba(255,255,255,0.18) 50%, rgba(255,255,255,0) 70%);
        mix-blend-mode: screen;
        pointer-events: none;
      }
      /* Vagues douces en bas */
      .waves {
        position: absolute; left: 0; right: 0; bottom: -2px; height: 26px;
        background:
          linear-gradient(90deg, rgba(0,0,0,0.32), rgba(0,0,0,0)),
          repeating-linear-gradient(45deg, rgba(255,255,255,0.06) 0 10px, rgba(255,255,255,0) 10px 20px);
      }
      /* Coin "page pliée" en bas à droite */
      .fold {
        position: absolute; right: 22px; bottom: 22px;
        width: 36px; height: 36px;
        background: linear-gradient(135deg, rgba(255,255,255,0) 50%, rgba(255,255,255,0.20) 50%);
        border-bottom-right-radius: 6px;
        border-right: 1px solid rgba(255,255,255,0.30);
        border-bottom: 1px solid rgba(255,255,255,0.30);
      }

      .row {
        position: relative; z-index: 1;
        height: 100%;
        display: grid; grid-template-columns: 1fr 480px;
        align-items: center;
      }
      .left {
        padding: 0 56px 0 96px;
        display: flex; align-items: center; gap: 28px;
      }
      .logo {
        width: 84px; height: 84px; border-radius: 18px; overflow: hidden;
        background: #ffffff; flex: 0 0 auto;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 14px 30px rgba(0,0,0,0.22);
      }
      .logo img { width: 76%; height: 76%; object-fit: contain; }
      .brand .name {
        font-size: 60px; font-weight: 900; letter-spacing: -0.02em; line-height: 1;
      }
      .brand .domain {
        margin-top: 8px; font-size: 18px; opacity: 0.92; letter-spacing: .04em; font-weight: 600;
      }
      .right {
        height: 100%;
        display: flex; align-items: center;
        padding: 0 64px;
        position: relative;
      }
      .right:before {
        content: ""; position: absolute; left: 0; top: 60px; bottom: 60px; width: 1px;
        background: linear-gradient(180deg, rgba(255,255,255,0), rgba(255,255,255,0.45) 20%, rgba(255,255,255,0.45) 80%, rgba(255,255,255,0));
      }
      .pitch {
        font-size: 24px; font-weight: 700; line-height: 1.3;
        max-width: 360px;
      }
      .pitch .ttl {
        display: block; font-size: 11px; letter-spacing: .32em; text-transform: uppercase; color: rgba(255,255,255,0.78);
        margin-bottom: 10px; font-weight: 800;
      }
      .pitch .url {
        display: inline-block; margin-top: 10px;
        background: rgba(255,255,255,0.14); border: 1px solid rgba(255,255,255,0.30);
        padding: 8px 14px; border-radius: 999px;
        font-size: 14px; font-weight: 700;
      }
      a { color: inherit; text-decoration: none; }
    </style>
  </head>
  <body>
    <div class="b">
      <div class="shine"></div>
      <div class="row">
        <div class="left">
          <div class="logo">{% if client.logo_url %}<img src="{{ client.logo_url }}" alt="" />{% endif %}</div>
          <div class="brand">
            <div class="name">{{ client.name }}</div>
            <div class="domain">{{ client.website_label or client.website_url or '' }}</div>
          </div>
        </div>
        <div class="right">
          <div class="pitch">
            <span class="ttl">— Profil</span>
            {{ client.subtitle or 'Présentation professionnelle' }}
            <div><span class="url">{{ client.website_label or client.website_url or '' }}</span></div>
          </div>
        </div>
      </div>
      <div class="waves"></div>
      <div class="fold"></div>
    </div>
  </body>
</html>
