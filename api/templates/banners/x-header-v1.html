<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>X header — v1</title>
    <style>
      :root {
        --c1: {{ client.color_primary or '#4e8baa' }};
        --c2: {{ client.color_secondary or '#5a9abf' }};
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: #0b1220; }
      table { border-collapse: collapse; }
      .banner {
        width: 1500px;
        height: 500px;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
        background:
          radial-gradient(900px 520px at 20% 40%, rgba(255,255,255,0.14), rgba(255,255,255,0) 60%),
          linear-gradient(135deg, var(--c1), var(--c2));
        color: #fff;
        padding: 56px 66px;
      }
      .name { font-size: 54px; font-weight: 950; letter-spacing: -0.02em; }
      .sub { margin-top: 12px; font-size: 20px; opacity: 0.95; max-width: 980px; }
      .logo {
        margin-top: 26px;
        width: 112px;
        height: 112px;
        border-radius: 24px;
        background: rgba(255,255,255,0.18);
        border: 1px solid rgba(255,255,255,0.22);
        overflow: hidden;
      }
      .logo img { width: 100%; height: 100%; object-fit: contain; background:#fff; }
    </style>
  </head>
  <body>
    <table role="presentation" class="banner">
      <tr>
        <td valign="top">
          <div class="name">{{ client.name }}</div>
          <div class="sub">{{ client.subtitle or '' }}</div>
          <div class="logo">{% if client.logo_url %}<img src="{{ client.logo_url }}" alt="" />{% endif %}</div>
        </td>
      </tr>
    </table>
  </body>
</html>
