<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YouTube banner — v1</title>
    <style>
      :root {
        --c1: {{ client.color_primary or '#4e8baa' }};
        --c2: {{ client.color_secondary or '#5a9abf' }};
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: #0b1220; }
      table { border-collapse: collapse; }
      .banner {
        width: 2560px;
        height: 1440px;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
        background:
          radial-gradient(1300px 900px at 20% 35%, rgba(255,255,255,0.16), rgba(255,255,255,0) 60%),
          radial-gradient(1500px 1100px at 85% 70%, rgba(0,0,0,0.25), rgba(0,0,0,0) 55%),
          linear-gradient(135deg, var(--c1), var(--c2));
        color: #fff;
        padding: 160px 190px;
      }
      .safe {
        width: 1546px; /* safe area approx */
        height: 423px;
        border-radius: 32px;
        border: 2px dashed rgba(255,255,255,0.35);
        background: rgba(15,23,42,0.18);
        padding: 54px 64px;
      }
      .name { font-size: 72px; font-weight: 950; letter-spacing: -0.02em; }
      .sub { margin-top: 14px; font-size: 28px; opacity: 0.95; max-width: 1200px; }
      .logo {
        margin-top: 28px;
        width: 160px;
        height: 160px;
        border-radius: 34px;
        background: rgba(255,255,255,0.18);
        border: 1px solid rgba(255,255,255,0.22);
        overflow: hidden;
      }
      .logo img { width: 100%; height: 100%; object-fit: contain; background:#fff; }
    </style>
  </head>
  <body>
    <table role="presentation" class="banner">
      <tr>
        <td valign="top">
          <div class="safe">
            <div class="name">{{ client.name }}</div>
            <div class="sub">{{ client.subtitle or '' }}</div>
            <div class="logo">{% if client.logo_url %}<img src="{{ client.logo_url }}" alt="" />{% endif %}</div>
          </div>
        </td>
      </tr>
    </table>
  </body>
</html>
