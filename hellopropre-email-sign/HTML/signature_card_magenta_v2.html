<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Signature mail — Carte magenta v2</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap">
</head>
<body>
  <!--
    Signature email "carte magenta v2" — calquée sur la maquette fournie.
    Compatible Gmail / Apple Mail / Outlook web (tables + styles inline).
    Quart-d'ellipse rose dans le coin HAUT-GAUCHE + quart-d'ellipse rose dans le coin BAS-DROIT.
  -->
  <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
    <tr>
      <td style="padding:0;">
        <table role="presentation" width="720" cellspacing="0" cellpadding="0" border="0" style="border-collapse:separate;border-spacing:0;width:720px;max-width:720px;background-color:#ffffff;border-radius:24px;">
          <tr>
            <!-- ============================================ -->
            <!-- COURBE HAUT-GAUCHE : quart-d'ellipse + coin arrondi 24px -->
            <!-- ============================================ -->
            <td width="180" style="width:180px;padding:0;vertical-align:top;mso-line-height-rule:exactly;font-size:0;line-height:0;">
              <img src="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='180' height='130' viewBox='0 0 180 130'%3E%3Cpath d='M 24 0 L 180 0 A 180 130 0 0 1 0 130 L 0 24 A 24 24 0 0 1 24 0 Z' fill='%23e6189d'/%3E%3C/svg%3E" width="180" height="130" alt="" style="display:block;border:0;width:180px;height:130px;">
            </td>

            <!-- ============================================ -->
            <!-- CONTENU PRINCIPAL                            -->
            <!-- ============================================ -->
            <td style="padding:26px 14px 26px 14px;vertical-align:middle;">
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse;">
                <!-- Ligne 1 : Photo + Nom + Poste -->
                <tr>
                  <td style="vertical-align:middle;">
                    <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse;">
                      <tr>
                        <td width="104" style="width:104px;vertical-align:middle;padding-right:18px;">
                          <img src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?auto=format&fit=crop&w=200&h=200&q=80" alt="" width="86" height="86" style="display:block;width:86px;height:86px;border-radius:86px;border:0;object-fit:cover;">
                        </td>
                        <td style="vertical-align:middle;">
                          <div style="font-size:26px;font-weight:700;letter-spacing:0.5px;line-height:1.15;color:#2b2b2f;margin:0;padding:0;">
                            NAME SURNAME
                          </div>
                          <div style="font-size:12px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;line-height:1.4;color:#9a9aa2;margin:8px 0 0;padding:0;">
                            CHIEF EXECUTIVE OFFICER
                          </div>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>

                <!-- Ligne 2 : Contacts en grille 2x2 -->
                <tr>
                  <td style="padding-top:22px;">
                    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse;">
                      <!-- Colonne gauche : email + téléphone -->
                      <tr>
                        <td width="50%" style="width:50%;vertical-align:top;padding-right:14px;">
                          <!-- Email -->
                          <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse;">
                            <tr>
                              <td width="32" style="width:32px;vertical-align:middle;">
                                <table role="presentation" width="22" cellspacing="0" cellpadding="0" border="0" style="border-collapse:separate;border-spacing:0;">
                                  <tr>
                                    <td width="22" height="22" style="width:22px;height:22px;background-color:#e6189d;border-radius:22px;line-height:0;font-size:0;text-align:center;">
                                      <img src="https://img.icons8.com/ios-filled/50/ffffff/new-post.png" alt="" width="12" height="12" style="display:inline-block;width:12px;height:12px;border:0;vertical-align:middle;">
                                    </td>
                                  </tr>
                                </table>
                              </td>
                              <td style="vertical-align:middle;font-size:13px;line-height:1.4;color:#7a7a82;padding-left:6px;">
                                <a href="mailto:name@company.com" style="color:#7a7a82;text-decoration:none;">name@company.com</a>
                              </td>
                            </tr>
                          </table>

                          <!-- Téléphone -->
                          <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse;margin-top:12px;">
                            <tr>
                              <td width="32" style="width:32px;vertical-align:middle;">
                                <table role="presentation" width="22" cellspacing="0" cellpadding="0" border="0" style="border-collapse:separate;border-spacing:0;">
                                  <tr>
                                    <td width="22" height="22" style="width:22px;height:22px;background-color:#e6189d;border-radius:22px;line-height:0;font-size:0;text-align:center;">
                                      <img src="https://img.icons8.com/ios-filled/50/ffffff/phone.png" alt="" width="12" height="12" style="display:inline-block;width:12px;height:12px;border:0;vertical-align:middle;">
                                    </td>
                                  </tr>
                                </table>
                              </td>
                              <td style="vertical-align:middle;font-size:13px;line-height:1.4;color:#7a7a82;padding-left:6px;">
                                <a href="tel:+998131171058908" style="color:#7a7a82;text-decoration:none;">+99 8131171058908</a>
                              </td>
                            </tr>
                          </table>
                        </td>

                        <!-- Colonne droite : web + localisation -->
                        <td width="50%" style="width:50%;vertical-align:top;padding-left:6px;">
                          <!-- Web -->
                          <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse;">
                            <tr>
                              <td width="32" style="width:32px;vertical-align:middle;">
                                <table role="presentation" width="22" cellspacing="0" cellpadding="0" border="0" style="border-collapse:separate;border-spacing:0;">
                                  <tr>
                                    <td width="22" height="22" style="width:22px;height:22px;background-color:#e6189d;border-radius:22px;line-height:0;font-size:0;text-align:center;">
                                      <img src="https://img.icons8.com/ios-filled/50/ffffff/domain.png" alt="" width="12" height="12" style="display:inline-block;width:12px;height:12px;border:0;vertical-align:middle;">
                                    </td>
                                  </tr>
                                </table>
                              </td>
                              <td style="vertical-align:middle;font-size:13px;line-height:1.4;color:#7a7a82;padding-left:6px;">
                                <a href="https://www.namecompany.com" style="color:#7a7a82;text-decoration:none;">www.namecompany.com</a>
                              </td>
                            </tr>
                          </table>

                          <!-- Localisation -->
                          <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="border-collapse:collapse;margin-top:12px;">
                            <tr>
                              <td width="32" style="width:32px;vertical-align:middle;">
                                <table role="presentation" width="22" cellspacing="0" cellpadding="0" border="0" style="border-collapse:separate;border-spacing:0;">
                                  <tr>
                                    <td width="22" height="22" style="width:22px;height:22px;background-color:#e6189d;border-radius:22px;line-height:0;font-size:0;text-align:center;">
                                      <img src="https://img.icons8.com/ios-filled/50/ffffff/marker.png" alt="" width="12" height="12" style="display:inline-block;width:12px;height:12px;border:0;vertical-align:middle;">
                                    </td>
                                  </tr>
                                </table>
                              </td>
                              <td style="vertical-align:middle;font-size:13px;line-height:1.4;color:#7a7a82;padding-left:6px;">
                                Earth Country
                              </td>
                            </tr>
                          </table>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
            </td>

            <!-- ============================================ -->
            <!-- COURBE BAS-DROIT : quart-d'ellipse + coin arrondi 24px (un peu plus petite) -->
            <!-- ============================================ -->
            <td width="150" style="width:150px;padding:0;vertical-align:bottom;mso-line-height-rule:exactly;font-size:0;line-height:0;">
              <img src="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='150' height='100' viewBox='0 0 150 100'%3E%3Cpath d='M 150 0 A 150 100 0 0 0 0 100 L 126 100 A 24 24 0 0 0 150 76 Z' fill='%23e6189d'/%3E%3C/svg%3E" width="150" height="100" alt="" style="display:block;border:0;width:150px;height:100px;">
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
