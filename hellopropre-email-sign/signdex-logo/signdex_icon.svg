<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="SignDex">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c2148a"/>
      <stop offset="55%" stop-color="#d6179a"/>
      <stop offset="100%" stop-color="#ff2bb1"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="225" ry="225" fill="url(#bgGrad)"/>

  <g transform="translate(512 540)" filter="url(#cardShadow)">
    <rect x="-280" y="-180" width="560" height="360" rx="48" ry="48" fill="#ffffff" opacity="0.45" transform="rotate(-13)"/>
    <rect x="-280" y="-180" width="560" height="360" rx="48" ry="48" fill="#ffffff" opacity="0.78" transform="rotate(-4)"/>
    <rect x="-280" y="-180" width="560" height="360" rx="48" ry="48" fill="#ffffff" transform="rotate(6)"/>
  </g>

  <g transform="translate(512 540) rotate(6)">
    <path d="M -200 60 C -130 -80, -50 130, 30 -10 C 80 -100, 160 50, 220 -30"
          stroke="#e6189d" stroke-width="26" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
